name: License Check

on:
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml

permissions:
  contents: read

jobs:
  check:
    name: Check Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for copyleft licenses
        run: |
          npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;SSPL-1.0;EUPL-1.1;EUPL-1.2;CPAL-1.0;OSL-3.0;CC-BY-SA-4.0"
